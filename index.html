<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Hub</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="header-container">
        <div class="weather">
            <img src="./header-imgs/cloudy.svg" height="80" alt="Weather" id="weather-icon">
            <h2 id="temp">10000°F</h2>
            <span id="description">Snowy</span>
            <p id="city">Arlington, TX</p>
        </div>
        <div class="date-time-container">
            <div class="time-box">
                <h1 id="current-time">17:10</h1>
            </div>
            <div class="date-box">
                <p id="current-date">Tuesday, February 17th</p>
            </div>
        </div>
        <div class="profile-container">
            <img src="./header-imgs/user-pen.svg" height="100" alt="profile">
            <h2>Ivo Ron</h2>
        </div>
    </header>
   <main>
        <aside class="left-sidebar">
            <button type="button" class="category-header-left-btn">
                <h3>Your Apps</h3>
            </button>  
            <nav class="personal-apps" aria-label="Personal Applications">              
                <button type="button" class="app-btn" data-url="./pictures.html">
                    <img src="./sidebar-imgs/pictures-icon.svg" alt="Pictures" class="btn-icon">
                    <span>Pictures</span>
                </button>
                <button type="button" class="tool-btn" data-url="https://www.facebook.com/">
                    <img src="./sidebar-imgs/facebook.svg" alt="Facebook" class="btn-icon">
                    <span>Facebook</span>
                </button>
                <button type="button" class="tool-btn" data-url="https://www.instagram.com/">
                    <img src="./sidebar-imgs/instagram.svg" alt="Instagram" class="btn-icon">
                    <span>Instagram</span>
                </button>
                 <button type="button" class="app-btn" data-url="https://open.spotify.com/">
                    <img src="./sidebar-imgs/spotify.svg" alt="spotify" class="btn-icon">
                    <span>Spotify</span>
                </button>
                <button type="button" class="app-btn" data-url="./games.html">
                    <img src="./sidebar-imgs/games-icon.svg" alt="Mini Games" class="btn-icon">
                    <span>Games</span>
                </button>
            </nav>
        </aside>        

        <section class="calendar-container">
            <div class="calendar">
                <h3>Main Highlights</h3>
                <ul>
                    <li>Ian's Birthday</li>
                    <li>Family Visit</li>
                </ul>
            </div>
        </section>

        <aside class="right-sidebar">
             <button type="button" class="category-header-right-btn">
                    <h3>Tools Apps</h3>
                </button>  
            <nav class="tools-apps" aria-label="Tools and Utilities">
               <button type="button" class="tool-btn" data-url="./inventory.html">
                    <img src="./sidebar-imgs/inventory-icon.svg" alt="Inventory" class="btn-icon">
                    <span>Inventory</span>
                </button>
                <button type="button" class="tool-btn" data-url="https://www.kroger.com/">
                    <img src="./sidebar-imgs/krogerlogo.svg" alt="Kroger" class="btn-icon">
                    <span>Kroger</span>
                </button>
                
                <button type="button" class="tool-btn" data-url="https://www.instacart.com/">
                    <img src="./sidebar-imgs/instacart.svg" alt="Instacart" class="btn-icon">
                    <span>Instacart</span>
                </button>
                <button type="button" class="tool-btn" data-url="https://www.wikipedia.org">
                    <img src="./sidebar-imgs/YouTube.svg" alt="YouTube" class="btn-icon">
                    <span>Youtube</span>
                </button>
                <button type="button" class="tool-btn" data-url="https://web.whatsapp.com/">
                    <img src="./sidebar-imgs/whatsapp-icon.svg" alt="WhatsApp" class="btn-icon">
                    <span>What'sApp</span>
                </button>
            </nav>
        </aside>
    </main>

    <footer class="footer-container">
        <div class="settings">
            <button type="button" class="footer-btn">⚙️ Settings</button>
        </div>
        <div class="alerts">
            <p>⚠️ Notifications / Alerts</p>
        </div>
        <div class="power-off">
            <button type="button" class="power-btn">⭕ Power</button>
        </div>
    </footer>
        <div id="modal-overlay">
            <div class="window">
                <button type="button" class="exit" id="close-modal">
                    <span>X</span>
                </button>
            <iframe id="app-frame" src="" frameborder="0"></iframe>
         </div>
        <script src="./script.js"></script>
</div>
</body>
</html>
